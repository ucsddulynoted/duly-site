<div class="member-dropdown">
  <button type="button" class="collapsible">Current Members '24-'25</button>
  <div class="content">
    {{ range .Site.Data.members.current }}
      <h3>{{ .year }}</h3>
      <div class="members-grid">
        {{ range .students }}
          {{ partial "members/current.html" . }}
        {{ end }}
      </div>
    {{ end }}
  </div>
</div>
